name: Vprofile CI/CD Pipeline
on:
    push:
        branches:
            - main

    pull_request:
        branches:
            - main

    workflow_dispatch:

    # schedule:
    #     - cron: "10 14 * * 1-5" # Runs at 14:10 UTC (9:10 AM EST) every weekday

env:
    ECR_REPOSITORY: vprofileapp-img

permissions:
    contents: read

jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Maven Build
              run: mvn install

            - name: Upload Build Artifact (WAR)
              uses: actions/upload-artifact@v7
              with:
                  name: vprofile-app
                  path: target/*.war

            - name: Notify if Build fails
              if: failure()
              run: echo "Build failed! Please check the logs for details."

    Testing:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Run tests on main branch
              if: github.ref == 'refs/heads/main'
              run: mvn test

            - name: Checkstyle
              if: github.ref == 'refs/heads/main'
              run: mvn checkstyle:checkstyle

            - name: Run tests on other branches
              if: github.ref != 'refs/heads/main'
              run: echo "Skipping Unit Tests and code analysis."

    Security-Scan:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Run Trivy filesystem scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  scan-type: "fs"
                  scan-ref: "."
                  format: "table"
                  exit-code: "0"
                  vuln-type: "os,library"
                  output: "trivy-results.table"

            - name: Upload Trivy Scan Results as an artifact
              uses: actions/upload-artifact@v7
              with:
                  name: trivy-scan-results
                  path: trivy-results.table

    Build-and-Publish-Docker-Image:
        name: Build and Publish Docker Image
        runs-on: ubuntu-latest
        environment: production
        needs: [Build, Testing, Security-Scan]
        if: github.ref == 'refs/heads/main'
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v3

            - name: Build, Tag and Push Docker Image to Amazon ECR
              id: build-image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build -f Docker-files/app/multistage/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
