name: Vprofile CI/CD Pipeline
on:
    push:
        branches:
            - main

    # pull_request:
    #     branches:
    #         - main

    # workflow_dispatch:

    # schedule:
    #     - cron: "10 14 * * 1-5" # Runs at 14:10 UTC (9:10 AM EST) every weekday

permissions:
    contents: read

jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Maven Build
              run: mvn install

            - name: Upload Build Artifact (WAR)
              uses: actions/upload-artifact@v7
              with:
                  name: vprofile-app
                  path: target/*.war

            - name: Notify if Build fails
              if: failure()
              run: echo "Build failed! Please check the logs for details."

    Testing:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Run tests on main branch
              run: mvn test

            - name: Checkstyle
              run: mvn checkstyle:checkstyle
