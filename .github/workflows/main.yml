name: Vprofile CI/CD Pipeline
on:
    push:
        branches:
            - main

    # pull_request:
    #     branches:
    #         - main

    # workflow_dispatch:

    # schedule:
    #     - cron: "10 14 * * 1-5" # Runs at 14:10 UTC (9:10 AM EST) every weekday

permissions:
    contents: read

jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Maven Build
              run: mvn install

            - name: Upload Build Artifact (WAR)
              uses: actions/upload-artifact@v7
              with:
                  name: vprofile-app
                  path: target/*.war

            - name: Notify if Build fails
              if: failure()
              run: echo "Build failed! Please check the logs for details."

    Testing:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Run tests on main branch
              if: github.ref == 'refs/heads/main'
              run: mvn test

            - name: Checkstyle
              if: github.ref == 'refs/heads/main'
              run: mvn checkstyle:checkstyle

            - name: Run tests on other branches
              if: github.ref != 'refs/heads/main'
              run: echo "Skipping Unit Tests and code analysis."

    Security-Scan:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v6
              with:
                  fatch-depth: 0

            - name: Run Trivy filesystem scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  scan-type: "fs"
                  scan-ref: "."
                  format: "json"
                  exit-code: "0"
                  vuln-type: "os,library"
                  output: "trivy-results.json"

            - name: Upload Trivy Scan Results as an artifact
              uses: actions/upload-artifact@v7
              with:
                  name: trivy-scan-results
                  path: trivy-results.json
